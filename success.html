<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transaction Successful</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-sm border border-emerald-100 text-center max-w-md w-full">
        <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <span class="text-3xl text-emerald-600">✓</span>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Order Authenticated!</h2>
        <p class="text-gray-500 text-sm mb-6">Database transaction handled cleanly by Django ORM engines.</p>
        
        <div class="bg-gray-50 p-4 rounded-xl text-left text-xs text-gray-600 space-y-1 mb-6 font-mono">
            <p><strong>Order ID:</strong> #{{ order.id }}</p>
            <p><strong>Product Name:</strong> {{ order.product.name }}</p>
            <p><strong>Gateway Provider:</strong> {{ order.payment_provider }}</p>
            <p><strong>Transaction State:</strong> {{ order.status }}</p>
        </div>

        <a href="/" class="block w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl hover:bg-emerald-700 transition">
            Return to Storefront
        </a>
    </div>
</body>
</html>
