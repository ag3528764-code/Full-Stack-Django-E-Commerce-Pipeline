<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review & Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
        <a href="/" class="text-sm text-indigo-600 font-medium hover:underline">← Cancel & Return</a>
        <h2 class="text-3xl font-extrabold text-gray-900 mt-4 mb-6">Select Gateway</h2>
        
        <div class="bg-gray-50 p-4 rounded-xl mb-6 border border-gray-100">
            <p class="text-sm text-gray-500 uppercase tracking-wider font-semibold">Item Details</p>
            <p class="text-lg font-bold text-gray-900 mt-1">{{ product.name }}</p>
            <p class="text-xl font-black text-indigo-600 mt-1">${{ product.price }}</p>
        </div>
        
        <form action="{% url 'process_payment' product.id %}" method="POST" class="space-y-4">
            {% csrf_token %}
            <label class="block p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition flex items-center">
                <input type="radio" name="provider" value="STRIPE" checked class="h-4 w-4 text-indigo-600">
                <div class="ml-4">
                    <span class="block font-bold text-gray-900">Stripe Integration</span>
                    <span class="text-xs text-gray-500">Supports international credit cards</span>
                </div>
            </label>

            <label class="block p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition flex items-center">
                <input type="radio" name="provider" value="RAZORPAY" class="h-4 w-4 text-indigo-600">
                <div class="ml-4">
                    <span class="block font-bold text-gray-900">Razorpay Gateway</span>
                    <span class="text-xs text-gray-500">Supports native UPI, Wallets, and NetBanking</span>
                </div>
            </label>

            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition mt-6 shadow-sm">
                Simulate Secure Transaction
            </button>
        </form>
    </div>
</body>
</html>
