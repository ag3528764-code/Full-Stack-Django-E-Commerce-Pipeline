<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevStore - Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans antialiased">
    <nav class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-indigo-600 tracking-tight">⚙️ DevStore</a>
            <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-semibold">Resume Showcase Portfolio</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-2">Available Infrastructure Shop</h1>
        <p class="text-gray-500 mb-10">Fully dynamic e-commerce model driven by native Django modules.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            {% for product in products %}
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col justify-between hover:shadow-md transition">
                <img src="{{ product.image_url }}" class="w-full h-64 object-cover" alt="{{ product.name }}">
                <div class="p-6 flex-1 flex flex-col justify-between">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-900 mb-2">{{ product.name }}</h2>
                        <p class="text-gray-600 text-sm line-clamp-3">{{ product.description }}</p>
                    </div>
                    <div class="mt-6 flex items-center justify-between pt-4 border-t border-gray-100">
                        <span class="text-3xl font-black text-gray-900">${{ product.price }}</span>
                        <a href="{% url 'checkout' product.id %}" class="bg-indigo-600 text-white font-medium px-6 py-2.5 rounded-xl hover:bg-indigo-700 transition">Checkout Item</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
